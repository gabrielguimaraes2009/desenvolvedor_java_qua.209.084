<!DOCTYPE html>
<html lang="pt-br"  xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: main-layout(~{::title},
 ~{::main})}">
<head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javalanches - Cadastrar novo cliente</title>
</head>
<body>
    <main>
        <h1>Cadastro de novo cliente</h1>
        <hr>
        <form method="POST">
            <div class="row">
                <div class="col-12 col-lg-4 mb-3">
                    <label for="nomeCliente" class="form-label">Informe o nome completo:</label>
                    <input type="text" class="form-control" placeholder="" 
                    id="nomeCliente" name="nomeCliente" required>
                </div>
                 <div class="col-12 col-lg-4 mb-3">
                    <label for="cpfCliente" class="form-label">Informe o CPF:</label>
                    <input type="text" class="form-control" placeholder="xxx-xxx-xxx-xx" 
                    id="cpfCliente" name="cpfCliente" required>
                </div>
                <div class="col-12 col-lg-4 mb-3">
                    <label for="dataNascimento" class="form-label">Informe a data de nascimento:</label>
                    <input type="text" class="form-control" placeholder="dd/dd/dddd" 
                    id="dataNascimento" name="dataNascimento" required>
                </div>
                <div class="col-12 col-lg-4 mb-3">
                    <label for="emailCliente" class="form-label">Informe o Email:</label>
                    <input type="email" class="form-control" placeholder="" 
                    id="emailCliente" name="emailCliente" required>
                </div>
                 <div class="col-12 col-lg-4 mb-3">
                    <label for="telefoneCliente" class="form-label">Informe o telefone:</label>
                    <input type="text" class="form-control" placeholder="ddd xxxx-xxxx" 
                    id="telefoneCliente" name="telefoneCliente" required>
                </div>
                <div class="col-12 col-lg-4 mb-3">
                    <label for="enderecoCliente" class="form-label">Informe oendereço:</label>
                </div>
                <div class="col-12 col-md-4 mb-3">
                    <label for="cep" class="form-label">CEP:</label>
                    <input type="text" class="form-control" id="cep" required>
                </div>
                <div class="col-12 col-md-4 col-lg-3 mb-3">
                    <label for="estado" class="form-label">Estado:</label>
                    <input type="text" class="form-control" id="estado" required>
                </div>
                <div class="col-12 col-md-4 col-lg-3 mb-3">
                    <label for="cidade" class="form-label">Cidade:</label>
                    <input type="text" class="form-control" id="cidade" required>
                </div>
                <div class="col-12 col-md-4 col-lg-3 mb-3">
                    <label for="bairro" class="form-label">Bairro:</label>
                    <input type="text" class="form-control" id="bairro" required>
                </div>
                <div class="col-12 col-md-8 col-lg-3 mb-3">
                    <label for="logradouro" class="form-label">Logradouro:</label>
                    <input type="text" class="form-control" id="logradouro" required>
                </div>
                <div class="col-12 col-md-4 col-lg-3 mb-3">
                    <label for="numero" class="form-label">Número:</label>
                    <input type="text" class="form-control" id="numero" required>
                </div>
                <div class="col-12 col-lg-9 mb-3">
                    <label for="complemento" class="form-label">Complemento:</label>
                    <input type="text" class="form-control" id="complemento">
                </div>
                <div class="d-flex justify-content-start">
                    <button type="submit" class="btn btn-primary">Cadastrar cliente</button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
