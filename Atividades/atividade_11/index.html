<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>

    <form method="">
        <label for="nome">Nome:</label><br>
        <input type="text" aria-label="nome" id="nome" required><br><br>
        <label for="peso">Informe seu peso em kg:</label><br>
        <input type="number" aria-label="peso" id="peso" required><br><br>
        <label for="altura">Informe sua altura em metros:</label><br>
        <input type="number" step="any" aria-label="altura" id="altura" required><br><br>
        <button type="submit">Enviar</button>
    </form>
    <hr>
    <h2 id="result"></h2>

    <script src="js/script.js"></script>

</body>
</html>
