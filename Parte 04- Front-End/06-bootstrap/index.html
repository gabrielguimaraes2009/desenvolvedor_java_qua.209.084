<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap</title>

    <!-- CSS bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- meu CSS -->
    <link href="css/estilo.css" rel="stylesheet" type="text/css" media="all">
</head>

<body>
    <!-- menu superior -->

    <!-- fim do menu superior -->

    <nav class="navbar navbar-expand-lg" data-bs-theme="dark"
        style="background: linear-gradient(to right, #090, #020);">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="img/doomgai.webp" alt="doomgai.webp" class="logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="mt-4">
        <div class="container">
            <h1>Formulário Bootstrap</h1>
            <hr>
            <!-- formulário -->
            <form method="">
                <div class="row">
                    <div class="col-12 col-md-6 col-xl-4 mb-3">
                        <label for="nome" class="form-label">Primeiro Nome</label>
                        <input class="form-control" type="text" placeholder="Informe o primeiro nome:"
                            aria-label="default input example">
                    </div>
                    <div class="col-12 col-md-6 col-xl-8 mb-3">
                        <label for="sobrenome" class="form-label">Sobrenome</label>
                        <input class="form-control" type="text" placeholder="Informe o sobrenome:"
                            aria-label="default input example">
                    </div>
                    <div class="col-12 col-md-4 col-xl-3 mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input class="form-control" type="text" placeholder="xxx.xxx.xxx-xx"
                            aria-label="default input example">
                    </div>
                    <div class="col-12 col-md-4 col-xl-3 mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input class="form-control" type="text" placeholder="(ddd) 9xxx-xxxx"
                            aria-label="default input example">
                    </div>
                    <div class="col-12 col-md-4 col-xl-3 mb-3">
                        <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                        <input class="form-control" type="date" placeholder="dd/mm/aaaa" aria-label="dataNascimento">
                    </div>
                    <div class="col-12 col-md-4 col-xl-3 mb-3">
                        <label for="genero" class="form-label">Gênero</label>
                        <select class="form-select" aria-label="Default select example">
                            <option selected>Escolha uma opção</option>
                            <option value="1">Masculino </option>
                            <option value="2">Feminino</option>
                            <option value="3">Outro</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex jjustify-content-center mt-5">
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </div>
            </form>
        </div>
    </main>

    <h1></h1>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
